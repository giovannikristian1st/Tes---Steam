<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Percobaan Soal Personal</title>
    <style>
        :root {
            --primary-color: #4f46e5; --primary-hover: #4338ca;
            --secondary-color: #06b6d4; --background-color: #f0fdfa;
            --card-background: #ffffff; --text-color: #1e293b;
            --text-light: #64748b; --success-color: #10b981;
            --border-radius: 16px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--background-color); color: var(--text-color); padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 650px; background: var(--card-background); padding: 30px; border-radius: var(--border-radius); box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 2px solid #e2e8f0; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: var(--primary-color); font-size: 24px; margin-bottom: 8px; }
        header p { color: var(--text-light); font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px 16px; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 15px; transition: 0.3s; outline: none; }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--secondary-color); box-shadow: 0 0 0 4px rgba(6,182,212,0.15); }
        textarea { resize: vertical; min-height: 120px; }
        button { width: 100%; background-color: var(--primary-color); color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: var(--primary-hover); }
        .btn-success { background-color: var(--success-color); }
        .btn-success:hover { background-color: #059669; }
        .box-tampil { background-color: #f8fafc; border-left: 5px solid var(--secondary-color); padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 16px; line-height: 1.6; white-space: pre-line; }
        .box-evaluasi { border-left-color: var(--success-color); background-color: #f0fdf4; }
        #loading { display: none; text-align: center; margin: 20px 0; font-weight: bold; color: var(--secondary-color); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        .hidden { display: none; }
        .progress-indicator { text-align: right; color: var(--text-light); font-weight: bold; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <header id="main-header">
            <h1>📝 Percobaan Soal Personal</h1>
            <p>Materi khusus yang dirancang sesuai minat dan hobimu!</p>
        </header>

        <div id="loading">⏳ Sedang memproses... Mohon tunggu ya!</div>

        <div id="section-profile">
            <div class="form-group">
                <label for="nama">Nama Lengkap</label>
                <input type="text" id="nama" placeholder="Masukkan namamu">
            </div>
            <div class="form-group">
                <label for="hobi">Hobi / Ketertarikan</label>
                <input type="text" id="hobi" placeholder="Misal: Sepak bola, Menggambar, Musik">
            </div>
            <button type="button" onclick="buatSoal()">Selanjutnya</button>
        </div>

        <div id="section-question" class="hidden">
            <div class="progress-indicator" id="progress-text">Soal 1 dari X</div>
            <div class="form-group">
                <div id="tampilan-soal" class="box-tampil"></div>
            </div>
            <div class="form-group">
                <label for="jawaban">Tulis Jawabanmu di Sini:</label>
                <textarea id="jawaban" placeholder="Ketik jawaban lengkapmu di sini..."></textarea>
            </div>
            <button type="button" id="btn-next-soal" onclick="prosesJawabanSaatIni()">Selanjutnya</button>
        </div>

        <div id="section-evaluation" class="hidden">
            <div class="form-group">
                <label>Hasil Evaluasi & Nilai:</label>
                <div id="tampilan-evaluasi" class="box-tampil box-evaluasi"></div>
            </div>
        </div>
    </div>

    <script>
        // =========================================================================
        // 🛠️ PENGATURAN GURU
        const JUMLAH_PERTANYAAN = "3"; 
        const TOPIK_PELAJARAN = "perkalian matematika"; 
        const JENIS_PERTANYAAN = "soal cerita studi kasus"; 
        // GANTI URL INI DENGAN URL WEB APP BARU ANDA YANG DIAKHIRI /exec
        const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbzT_s3kR4ylLil0XZZxRgiWV-aZJuW5Nxd-OTehIyzu_MUOUe6smNy9ilUIjKpBHviXyA/exec"; 
        // =========================================================================

        let daftarSoal = [];
        let daftarJawaban = [];
        let indexSoalSaatIni = 0;

        function toggleLoading(show) { document.getElementById('loading').style.display = show ? 'block' : 'none'; }

        // Minta Data ke Backend
        async function buatSoal() {
            const nama = document.getElementById('nama').value.trim();
            const hobi = document.getElementById('hobi').value.trim();
            if (!nama || !hobi) { alert("Harap isi profil terlebih dahulu!"); return; }

            toggleLoading(true);
            document.getElementById('section-profile').classList.add('hidden');
            
            try {
                const response = await fetch(URL_APPS_SCRIPT, {
                    method: "POST",
                    body: JSON.stringify({ action: "generate_soal", nama: nama, hobi: hobi, topik: TOPIK_PELAJARAN, jumlah: JUMLAH_PERTANYAAN, jenis: JENIS_PERTANYAAN })
                });
                const data = await response.json();
                
                if (data.error) throw new Error(data.error);

                daftarSoal = data.array_soal; // Menyimpan JSON array dari server
                indexSoalSaatIni = 0;
                daftarJawaban = [];
                
                tampilkanSoalAktif();
            } catch (error) {
                alert("Gagal memuat soal: " + error);
                document.getElementById('section-profile').classList.remove('hidden');
            } finally {
                toggleLoading(false);
            }
        }

        // Render Halaman Soal
        function tampilkanSoalAktif() {
            document.getElementById('section-question').classList.remove('hidden');
            document.getElementById('progress-text').innerText = `Pertanyaan ${indexSoalSaatIni + 1} dari ${daftarSoal.length}`;
            document.getElementById('tampilan-soal').innerText = daftarSoal[indexSoalSaatIni];
            document.getElementById('jawaban').value = ""; // Kosongkan text area

            // Ubah teks tombol jika ini adalah soal terakhir
            const btnNext = document.getElementById('btn-next-soal');
            if (indexSoalSaatIni === daftarSoal.length - 1) {
                btnNext.innerText = "🚀 Kumpulkan Semua Jawaban";
                btnNext.className = "btn-success";
            } else {
                btnNext.innerText = "Selanjutnya";
                btnNext.className = "";
            }
        }

        // Simpan jawaban & pindah halaman
        function prosesJawabanSaatIni() {
            const jawabanInput = document.getElementById('jawaban').value.trim();
            if (!jawabanInput) { alert("Jangan lupa isi jawabanmu!"); return; }

            // Simpan ke memori
            daftarJawaban[indexSoalSaatIni] = jawabanInput;

            if (indexSoalSaatIni < daftarSoal.length - 1) {
                // Lanjut soal berikutnya
                indexSoalSaatIni++;
                tampilkanSoalAktif();
            } else {
                // Semua soal selesai, kirim ke server
                kirimUntukDikoreksi();
            }
        }

        async function kirimUntukDikoreksi() {
            toggleLoading(true);
            document.getElementById('section-question').classList.add('hidden');
            document.getElementById('main-header').classList.add('hidden'); // Sembunyikan judul atas agar luas

            try {
                const response = await fetch(URL_APPS_SCRIPT, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "koreksi_jawaban",
                        nama: document.getElementById('nama').value,
                        hobi: document.getElementById('hobi').value,
                        topik: TOPIK_PELAJARAN,
                        soal: daftarSoal,     // Kirim seluruh array soal
                        jawaban: daftarJawaban // Kirim seluruh array jawaban
                    })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error);

                // Tampilkan hasil murid (Rubrik rahasia sudah otomatis tersimpan di Spreadsheet)
                document.getElementById('tampilan-evaluasi').innerText = data.teks_evaluasi;
                document.getElementById('section-evaluation').classList.remove('hidden');
            } catch (error) {
                alert("Gagal mengoreksi: " + error);
                document.getElementById('section-question').classList.remove('hidden');
            } finally {
                toggleLoading(false);
            }
        }
    </script>
</body>
</html>
